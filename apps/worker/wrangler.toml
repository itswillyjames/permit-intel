name = "permit-intel-worker"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[vars]
# Override in environment secrets:
# API_KEY = "your-secret"
# OPENAI_API_KEY = "sk-..."
# ANTHROPIC_API_KEY = "sk-ant-..."

[[d1_databases]]
binding = "DB"
database_name = "permit-intel"
database_id = "e0ee4904-230d-4535-8a84-7e0b6b04bbe9"

[[queues.consumers]]
queue = "permit-intel-pipeline"
max_batch_size = 10
max_batch_timeout = 30

[[queues.producers]]
queue = "permit-intel-pipeline"
binding = "PIPELINE_QUEUE"
[[r2_buckets]]
binding = "EXPORTS_BUCKET"
bucket_name = "permit-intel-exports"

[[r2_buckets]]
binding = "EVIDENCE_BUCKET"
bucket_name = "permit-intel-evidence"
[dev]
port = 8787
local_protocol = "http"
