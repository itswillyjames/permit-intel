<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Permit Intelligence Terminal</title>
<style>
body { background:#0d0d0d; color:#f0f0f0; font-family:monospace; padding:1rem; }
h1 { color:#00ffcc; }
button { background:#222; color:#0ff; border:none; padding:0.5rem 1rem; margin:0.25rem; cursor:pointer; }
button:hover { background:#00ffcc; color:#000; }
#output { border:1px solid #0ff; padding:1rem; margin-top:1rem; max-height:400px; overflow:auto; }
</style>
</head>
<body>
<h1>Permit Intelligence Terminal</h1>
<button id="healthBtn">Health</button>
<button id="runBtn">Run Engine</button>
<div id="output"></div>

<script>
const output = document.getElementById('output');
const WORKER_URL = 'https://permit-intel-proxy.trev-tce.workers.dev';

function log(msg){ output.innerHTML += msg+'<br>'; }

document.getElementById('healthBtn').addEventListener('click', async ()=>{
    log('Checking worker health...');
    try{
        const res = await fetch(`${WORKER_URL}/api/health`);
        const data = await res.json();
        log('Worker Health: '+JSON.stringify(data));
    }catch(e){ log('Health check failed: '+e.message); }
});

document.getElementById('runBtn').addEventListener('click', async ()=>{
    log('Running pipeline...');
    try{
        const res = await fetch(`${WORKER_URL}/api/batch-pipeline`);
        const data = await res.json();
        log('Briefs generated: '+data.briefs.length);
        data.briefs.forEach((b,i)=>{
            log(`<b>Brief ${i+1}:</b> ${b.headline} — Score: ${b.score}`);
        });
    }catch(e){ log('Pipeline failed: '+e.message); }
});
</script>
</body>
</html>
