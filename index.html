<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Permit Intelligence Engine</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono&display=swap" rel="stylesheet">
<style>
  body { background:#0a0a0a; color:#ffa500; font-family:'IBM Plex Mono', monospace; margin:0; padding:0; }
  header { padding:1rem; text-align:center; border-bottom:1px solid #444; }
  h1 { margin:0; font-size:1.8rem; }
  main { display:flex; flex-direction:column; padding:1rem; }
  .controls { display:flex; gap:1rem; margin-bottom:1rem; }
  button { background:#222; color:#ffa500; border:1px solid #444; padding:0.5rem 1rem; cursor:pointer; }
  button:hover { background:#333; }
  .kpi { display:flex; gap:1rem; margin-bottom:1rem; }
  .kpi div { border:1px solid #444; padding:0.5rem 1rem; flex:1; text-align:center; }
  pre { white-space:pre-wrap; word-wrap:break-word; background:#111; padding:1rem; border-radius:4px; }
  .panel { margin-bottom:1rem; }
</style>
</head>
<body>

<header>
  <h1>Permit Intelligence Engine</h1>
  <button id="healthCheck">HEALTH</button>
  <span id="healthStatus">Checking...</span>
</header>

<main>
  <div class="controls">
    <select id="sourceSelect">
      <option value="chicago">Chicago – Building Permits</option>
      <option value="seattle">Seattle – Permits</option>
      <option value="cincinnati">Cincinnati – Building Permits</option>
    </select>
    <input type="number" id="limit" placeholder="Max rows" value="50" min="1">
    <button id="runEngine">RUN ENGINE</button>
    <button id="clearCache">CLEAR CACHE</button>
    <button id="downloadPdf">DOWNLOAD PDF</button>
  </div>

  <div class="kpi">
    <div>Signals <span id="signals">0</span></div>
    <div>Sellable <span id="sellable">0</span></div>
    <div>Total Est. Value <span id="totalValue">$0</span></div>
  </div>

  <div class="panel">
    <h3>Redacted Snippet Preview</h3>
    <pre id="redactedSnippet">No data loaded yet.</pre>
  </div>

  <div class="panel">
    <h3>Deal Recommendations</h3>
    <pre id="deals">No deals yet.</pre>
  </div>

  <div class="panel">
    <h3>Brief Output (PDF/Email-ready)</h3>
    <pre id="brief">No brief generated.</pre>
  </div>

  <div id="debug" class="panel">
    <h3>Debug Output</h3>
    <pre id="debugOutput">No debug yet.</pre>
  </div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.6.1/jspdf.umd.min.js"></script>
<script>
const workerUrl = 'https://permit-intel-proxy.trev-tce.workers.dev/api/enrich';

async function healthCheck() {
  document.getElementById('healthStatus').textContent = 'Checking...';
  try {
    const res = await fetch(workerUrl, { method:'POST', body: JSON.stringify({ test:'health' }), headers:{'Content-Type':'application/json'} });
    const json = await res.json();
    document.getElementById('healthStatus').textContent = json.ok ? 'GROQ: ✓' : '❌';
  } catch(e) {
    document.getElementById('healthStatus').textContent = '❌';
  }
}

async function runEngine() {
  const source = document.getElementById('sourceSelect').value;
  const limit = parseInt(document.getElementById('limit').value,10);
  document.getElementById('debugOutput').textContent = 'Fetching data...';

  try {
    const permits = await fetch(`https://api.mock.permits/${source}?limit=${limit}`).then(r=>r.json()); // replace with live Socrata fetch
    let totalSignals = permits.length;
    let sellableCount = 0;
    let totalValue = 0;
    let redactedSnippets = [];
    let deals = [];
    let briefText = '';

    for(const permit of permits) {
      const res = await fetch(workerUrl, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify(permit)
      });
      const data = await res.json();
      if(data.ok) {
        sellableCount++;
        totalValue += permit.value || 0;
        redactedSnippets.push(data.pipeline.redactedSnippet.map(r=>r.teaser).join('\n'));
        deals.push(data.pipeline.deals.map(d=>`${d.buyerType}: ${d.suggestedDeal}`).join('\n'));
        briefText += data.pipeline.brief.text + '\n\n---\n\n';
      }
    }

    document.getElementById('signals').textContent = totalSignals;
    document.getElementById('sellable').textContent = sellableCount;
    document.getElementById('totalValue').textContent = '$'+totalValue.toLocaleString();
    document.getElementById('redactedSnippet').textContent = redactedSnippets.join('\n\n');
    document.getElementById('deals').textContent = deals.join('\n\n');
    document.getElementById('brief').textContent = briefText;
    document.getElementById('debugOutput').textContent = 'Pipeline completed successfully.';

  } catch(e) {
    document.getElementById('debugOutput').textContent = 'Error: '+e.message;
  }
}

function clearCache() { alert('Cache cleared (simulated)'); }

function downloadPdf() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const brief = document.getElementById('brief').textContent;
  doc.setFont('Courier','');
  doc.setFontSize(10);
  const lines = doc.splitTextToSize(brief, 180);
  doc.text(lines, 10, 10);
  doc.save('permit_brief.pdf');
}

document.getElementById('healthCheck').addEventListener('click',healthCheck);
document.getElementById('runEngine').addEventListener('click',runEngine);
document.getElementById('clearCache').addEventListener('click',clearCache);
document.getElementById('downloadPdf').addEventListener('click',downloadPdf);
</script>
</body>
</html>
