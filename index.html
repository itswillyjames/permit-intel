<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Permit Intel Terminal v2.1</title>
<style>
body { background:#111; color:#ffa; font-family:'IBM Plex Mono', monospace; margin:0; padding:0; }
header { padding:1rem; font-size:1.5rem; text-align:center; border-bottom:1px solid #444; }
#controls { display:flex; justify-content:center; gap:1rem; margin:1rem; }
button { background:#222; color:#ffa; border:1px solid #444; padding:.5rem 1rem; cursor:pointer; }
button:hover { background:#333; }
#pipeline, #briefs { margin:1rem; padding:1rem; border:1px solid #444; min-height:200px; }
</style>
</head>
<body>

<header>Permit Intel Terminal v2.1</header>

<div id="controls">
<select id="city">
<option value="CHI">Chicago</option>
<option value="SEA">Seattle</option>
<option value="CIN">Cincinnati</option>
</select>
<button id="fetchBtn">Fetch Permits</button>
<button id="runPipelineBtn">▶ Run Pipeline</button>
</div>

<div id="pipeline">
<h3>Pipeline Status</h3>
<pre id="pipelineLog">No debug yet.</pre>
</div>

<div id="briefs">
<h3>Briefs</h3>
<pre id="briefOutput">No briefs yet.</pre>
</div>

<script>
const workerUrl = "https://permit-intel-proxy.trev-tce.workers.dev/api";

let permits = [];

document.getElementById("fetchBtn").onclick = async () => {
  const city = document.getElementById("city").value;
  document.getElementById("pipelineLog").textContent = "Fetching permits...";
  try {
    const res = await fetch(workerUrl, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ city })
    });
    const data = await res.json();
    if(data.ok && data.permits){
      permits = data.permits;
      document.getElementById("pipelineLog").textContent = `Fetched ${permits.length} permits for ${city}`;
      document.getElementById("briefOutput").textContent = "No briefs yet.";
    } else {
      document.getElementById("pipelineLog").textContent = "Error fetching permits: " + (data.error||"Unknown");
    }
  } catch(e){
    document.getElementById("pipelineLog").textContent = "Fetch failed: "+e.message;
  }
};

document.getElementById("runPipelineBtn").onclick = async () => {
  if(!permits.length){ alert("Fetch permits first!"); return; }
  const logs=[]; const briefs=[];
  for(const p of permits){
    logs.push(`Processing permit: ${p.address}`);
    // Score
    const score = Math.min(100, Math.floor(Math.random()*30)+70);
    logs.push(`Score: ${score}/100`);

    const brief = `
PROJECT: ${p.address}
CONTRACTOR: ${p.contractor}
VALUE: $${p.value?.toLocaleString() || 'N/A'}
EMAILS: ${p.emails?.map(e=>e.email).join(', ') || 'None'}
SCORE: ${score}/100
TLDR: High-value opportunity for construction suppliers.
    `.trim();
    briefs.push(brief);
  }
  document.getElementById("pipelineLog").textContent = logs.join("\n");
  document.getElementById("briefOutput").textContent = briefs.join("\n\n---\n\n");
};
</script>

</body>
</html>
