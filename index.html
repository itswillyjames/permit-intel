<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Permit Intelligence Engine — Worker Routed</title>
  <style>
    :root{
      --bg:#07070b; --panel:#12121a; --border:#2a2a38;
      --text:#e8e8f2; --muted:#a1a1b3; --accent:#3b82f6;
      --good:#10b981; --warn:#f59e0b; --bad:#ef4444;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      --r:12px;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans)}
    header{
      position:sticky;top:0;z-index:10;
      background:rgba(18,18,26,.95);
      border-bottom:1px solid var(--border);
      padding:12px 14px;
      display:flex;gap:10px;align-items:center;justify-content:space-between;flex-wrap:wrap;
    }
    .brand{font-weight:800;letter-spacing:.3px}
    .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    select,input,button{
      background:var(--panel);color:var(--text);border:1px solid var(--border);
      padding:9px 10px;border-radius:10px;font-size:14px;
    }
    input{width:220px}
    button{cursor:pointer}
    button.primary{background:var(--accent);border-color:var(--accent);font-weight:700}
    button.ghost:hover{border-color:var(--accent)}
    .status{font-size:13px;color:var(--muted)}
    .pill{padding:4px 8px;border-radius:999px;border:1px solid var(--border);font-size:12px}
    .pill.good{color:var(--good);border-color:rgba(16,185,129,.4)}
    .pill.warn{color:var(--warn);border-color:rgba(245,158,11,.4)}
    .pill.bad{color:var(--bad);border-color:rgba(239,68,68,.4)}
    main{display:grid;grid-template-columns:420px 1fr;min-height:calc(100vh - 64px)}
    .col{border-right:1px solid var(--border)}
    .col:last-child{border-right:none}
    .panel{padding:12px 14px;border-bottom:1px solid var(--border)}
    .title{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;font-weight:700}
    .list{height:calc(100vh - 64px - 68px);overflow:auto}
    .item{
      padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer;
    }
    .item:hover{background:rgba(255,255,255,.03)}
    .item.sel{background:rgba(59,130,246,.12);border-left:3px solid var(--accent)}
    .addr{font-weight:800}
    .meta{margin-top:4px;color:var(--muted);font-size:13px;line-height:1.35;word-break:break-word}
    .kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:10px}
    .kpi{background:var(--panel);border:1px solid var(--border);border-radius:var(--r);padding:10px}
    .kpi .n{font-size:18px;font-weight:900}
    .kpi .l{font-size:12px;color:var(--muted);margin-top:3px}
    textarea{
      width:100%;min-height:240px;resize:vertical;
      background:var(--panel);border:1px solid var(--border);
      color:var(--text);border-radius:var(--r);padding:12px;
      font-family:var(--mono);font-size:12px;line-height:1.4;
    }
    pre{
      margin:0;background:var(--panel);border:1px solid var(--border);
      border-radius:var(--r);padding:10px;color:var(--muted);
      font-family:var(--mono);font-size:12px;white-space:pre-wrap;word-break:break-word
    }
    .btnrow{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
    @media (max-width: 980px){
      main{grid-template-columns:1fr}
      .col{border-right:none;border-bottom:1px solid var(--border)}
      .list{height:auto;max-height:45vh}
    }
  </style>
</head>
<body>
<header>
  <div class="row">
    <div class="brand">Permit Intelligence Engine</div>
    <span id="workerPill" class="pill warn">Worker: checking…</span>
  </div>
  <div class="row">
    <select id="source">
      <option value="chicago">Chicago — Building Permits</option>
      <option value="seattle">Seattle — Permits</option>
    </select>
    <select id="limit">
      <option value="50">50</option>
      <option value="100" selected>100</option>
      <option value="250">250</option>
    </select>
    <input id="q" placeholder="Search address / type / contact" />
    <button class="primary" id="runBtn">RUN ENGINE</button>
    <button class="ghost" id="clearBtn">CLEAR CACHE</button>
    <span class="status" id="status">Ready</span>
  </div>
</header>

<main>
  <div class="col">
    <div class="panel">
      <div class="title">Ranked Signals</div>
      <div class="kpis">
        <div class="kpi"><div class="n" id="kSignals">0</div><div class="l">Signals</div></div>
        <div class="kpi"><div class="n" id="kSellable">0</div><div class="l">Sellable (>= min)</div></div>
        <div class="kpi"><div class="n" id="kValue">$0</div><div class="l">Total Est. Value</div></div>
      </div>
    </div>
    <div class="list" id="list"></div>
  </div>

  <div class="col">
    <div class="panel">
      <div class="title">Deal Panel</div>
      <div class="btnrow">
        <button id="copyBrief" class="ghost">COPY BRIEF</button>
        <button id="copyPitch" class="ghost">COPY PITCH</button>
      </div>
      <div style="margin-top:10px">
        <textarea id="brief" readonly placeholder="Select a signal…"></textarea>
      </div>
    </div>

    <div class="panel">
      <div class="title">Debug (last fetch + error)</div>
      <pre id="debug">No debug yet.</pre>
    </div>
  </div>
</main>

<script>
  // ✅ ONLY this endpoint is used for permits
  const WORKER_BASE = "https://permit-intel-proxy.trev-tce.workers.dev";

  const SOURCES = {
    chicago: { label: "Chicago — Building Permits" },
    seattle: { label: "Seattle — Permits" }
  };

  const $ = (id) => document.getElementById(id);

  const state = {
    raw: [],
    signals: [],
    selected: null,
    lastDebug: "",
    lastError: null
  };

  function setStatus(msg){ $("status").textContent = msg; }

  function setWorkerPill(kind, text){
    const el = $("workerPill");
    el.className = "pill " + kind;
    el.textContent = text;
  }

  function dbg(line){
    const t = new Date().toISOString();
    state.lastDebug = `[${t}] ${line}`;
    $("debug").textContent = state.lastDebug;
  }

  function money(n){
    const x = Number(n||0);
    if(!Number.isFinite(x)) return "$0";
    return "$" + Math.round(x).toLocaleString();
  }

  function cacheKey(source){ return `permitintel:lastgood:${source}`; }
  function saveLastGood(source, raw){
    try{ localStorage.setItem(cacheKey(source), JSON.stringify({t:Date.now(), raw})); }catch{}
  }
  function loadLastGood(source){
    try{
      const v = localStorage.getItem(cacheKey(source));
      if(!v) return null;
      return JSON.parse(v);
    }catch{return null}
  }
  function clearCacheAll(){
    try{
      Object.keys(localStorage).forEach(k=>{
        if(k.startsWith("permitintel:lastgood:")) localStorage.removeItem(k);
      });
    }catch{}
  }

  async function workerHealth(){
    const url = `${WORKER_BASE}/api/health`;
    try{
      const r = await fetch(url, { cache: "no-store" });
      if(!r.ok) throw new Error(`HTTP ${r.status}`);
      const j = await r.json();
      if(j && j.ok) setWorkerPill("good","Worker: OK");
      else setWorkerPill("warn","Worker: maybe");
      dbg(`Health OK via ${url}`);
      return true;
    }catch(e){
      setWorkerPill("bad","Worker: failed");
      dbg(`Health FAIL via ${url} :: ${String(e && e.message || e)}`);
      return false;
    }
  }

  // Fetch with timeout + full debug
  async function fetchPermits(source, limit){
    const url = `${WORKER_BASE}/api/permits?source=${encodeURIComponent(source)}&limit=${encodeURIComponent(limit)}`;
    dbg(`Fetching: ${url}`);
    const ctrl = new AbortController();
    const to = setTimeout(()=>ctrl.abort(), 15000);
    try{
      const r = await fetch(url, { signal: ctrl.signal, cache: "no-store" });
      const text = await r.text();
      dbg(`HTTP ${r.status} from Worker. bytes=${text.length}`);
      if(!r.ok){
        throw new Error(`Worker HTTP ${r.status}: ${text.slice(0, 200)}`);
      }
      const data = JSON.parse(text);
      if(!Array.isArray(data)) throw new Error("Worker did not return an array");
      return data;
    }finally{
      clearTimeout(to);
    }
  }

  // Minimal normalization across Chicago + Seattle responses
  function normalize(source, row){
    // Chicago has: street_number, street_direction, street_name, permit_type, issue_date, reported_cost, work_description, contact_*
    // Seattle has: originaladdress1, permittypedesc, applieddate, estprojectcost, description
    if(source === "chicago"){
      const addr = [row.street_number, row.street_direction, row.street_name].filter(Boolean).join(" ");
      return {
        id: row.id || row.permit_ || "unknown",
        address: addr || "Unknown address",
        type: row.permit_type || "Permit",
        date: row.issue_date || row.application_start_date || "",
        value: Number(row.reported_cost || 0),
        desc: row.work_description || "",
        contact: row.contact_3_name || row.contact_1_name || row.contact_2_name || ""
      };
    }
    // Seattle
    return {
      id: row.permitnum || "unknown",
      address: row.originaladdress1 || "Unknown address",
      type: row.permittypedesc || row.permittypemapped || "Permit",
      date: row.applieddate || "",
      value: Number(row.estprojectcost || 0),
      desc: row.description || "",
      contact: "" // Seattle feed often doesn’t have person/company names
    };
  }

  // Simple “signal” scoring for now (fast + reliable)
  function scoreSig(x){
    let s = 50;
    if((x.type||"").toLowerCase().includes("new")) s += 15;
    if((x.type||"").toLowerCase().includes("demol")) s += 10;
    if(x.value >= 500000) s += 15;
    if(x.value >= 1000000) s += 10;
    if((x.desc||"").length > 80) s += 5;
    if((x.contact||"").length > 2) s += 5;
    return Math.max(0, Math.min(100, s));
  }

  function buildSignals(source, raw){
    const norm = raw.map(r=>normalize(source, r));
    const sigs = norm.map(n=>({
      ...n,
      score: scoreSig(n)
    }))
    .sort((a,b)=>b.score-a.score);
    return sigs;
  }

  function render(){
    const q = ($("q").value||"").trim().toLowerCase();
    const items = state.signals.filter(s=>{
      if(!q) return true;
      return (s.address||"").toLowerCase().includes(q)
        || (s.type||"").toLowerCase().includes(q)
        || (s.contact||"").toLowerCase().includes(q)
        || (s.desc||"").toLowerCase().includes(q);
    });

    $("kSignals").textContent = items.length;
    const sellable = items.filter(x=>x.score >= 70);
    $("kSellable").textContent = sellable.length;
    const totalValue = items.reduce((a,x)=>a+(Number(x.value)||0),0);
    $("kValue").textContent = money(totalValue);

    const list = $("list");
    list.innerHTML = "";
    if(!items.length){
      list.innerHTML = `<div class="item"><div class="addr">No data loaded yet.</div><div class="meta">Click RUN ENGINE. If it fails, check Debug.</div></div>`;
      return;
    }

    for(const s of items){
      const div = document.createElement("div");
      div.className = "item" + (state.selected && state.selected.id === s.id ? " sel" : "");
      div.onclick = ()=>selectSignal(s);
      div.innerHTML = `
        <div class="addr">${escapeHtml(s.address)}</div>
        <div class="meta">${escapeHtml(s.type)} • score ${s.score}/100 • ${escapeHtml(s.date||"")}</div>
        <div class="meta">value: ${money(s.value)}${s.contact ? " • contact: "+escapeHtml(s.contact) : ""}</div>
      `;
      list.appendChild(div);
    }
  }

  function escapeHtml(str){
    return String(str||"")
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;");
  }

  function makeBrief(s){
    const today = new Date().toISOString().slice(0,10);
    return [
      `CLIENT BRIEF — PERMIT SIGNAL`,
      `DATE: ${today}`,
      ``,
      `Address: ${s.address}`,
      `Permit Type: ${s.type}`,
      `Issued/Applied: ${s.date || "N/A"}`,
      `Est. Value: ${money(s.value)}`,
      `Score: ${s.score}/100`,
      s.contact ? `Contact/Entity: ${s.contact}` : `Contact/Entity: N/A`,
      ``,
      `Why this matters:`,
      `This record indicates active work. High score usually means larger scope, clearer intent, or better buyer fit.`,
      ``,
      `Description:`,
      `${s.desc || "N/A"}`,
      ``,
      `Source: ${$("source").value} via Worker ${WORKER_BASE}`
    ].join("\n");
  }

  function makePitch(s){
    return `Quick heads up — I spotted a permit at ${s.address}. It looks like real work (type: ${s.type}, est. ${money(s.value)}). Want the 1-page brief + key details so you can act on it fast?`;
  }

  function selectSignal(s){
    state.selected = s;
    $("brief").value = makeBrief(s);
    render();
  }

  async function copyText(t){
    try{
      await navigator.clipboard.writeText(t);
      setStatus("Copied");
      setTimeout(()=>setStatus("Ready"),800);
    }catch{
      alert("Copy failed — copy manually.");
    }
  }

  async function run(){
    const source = $("source").value;
    const limit = Number($("limit").value||100);
    setStatus("Fetching live data…");
    try{
      const raw = await fetchPermits(source, limit);
      state.raw = raw;
      saveLastGood(source, raw);
      state.signals = buildSignals(source, raw);
      setStatus("Live data loaded");
      render();
      if(state.signals[0]) selectSignal(state.signals[0]);
    }catch(e){
      const msg = String(e && e.message || e);
      setStatus("Live fetch failed — using cached last-good");
      dbg(`Live fetch failed: ${msg}`);
      const cached = loadLastGood(source);
      if(cached && Array.isArray(cached.raw)){
        state.raw = cached.raw;
        state.signals = buildSignals(source, cached.raw);
        setStatus("Loaded cached last-good");
        render();
      }else{
        state.raw = [];
        state.signals = [];
        setStatus("Live fetch failed — no cache");
        dbg(`Live fetch failed. Error: ${msg}. No cached last-good data found.`);
        render();
      }
    }
  }

  $("runBtn").addEventListener("click", run);
  $("clearBtn").addEventListener("click", ()=>{
    clearCacheAll();
    state.raw = [];
    state.signals = [];
    state.selected = null;
    $("brief").value = "";
    setStatus("Cache cleared");
    dbg("Cache cleared manually.");
    render();
  });
  $("source").addEventListener("change", ()=>{
    state.selected = null;
    $("brief").value = "";
    run();
  });
  $("q").addEventListener("input", render);
  $("copyBrief").addEventListener("click", ()=>{
    if(!state.selected) return alert("Select a signal first.");
    copyText($("brief").value);
  });
  $("copyPitch").addEventListener("click", ()=>{
    if(!state.selected) return alert("Select a signal first.");
    copyText(makePitch(state.selected));
  });

  (async function boot(){
    setStatus("Checking Worker…");
    await workerHealth();
    setStatus("Ready");
    render();
    run();
  })();
</script>
</body>
</html>
