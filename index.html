<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Permit Intelligence Engine v10</title>
  <style>
    :root{
      --bg:#07070b;
      --panel:#12121a;
      --border:#2a2a38;
      --text:#e8e8f2;
      --muted:#9aa0b3;
      --accent:#ef4444;
      --green:#10b981;
      --blue:#3b82f6;
      --yellow:#f59e0b;
      --neon:#39ff14;
      --mono: ui-monospace, SFMono-Regular, Menlo, monospace;
      --radius:10px;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      background:var(--bg);
      color:var(--text);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      padding:20px;
    }
    h1,h2,h3{margin-bottom:10px}
    header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:20px;
      flex-wrap:wrap;
    }
    .brand{
      font-family:var(--mono);
      color:var(--accent);
      font-size:14px;
      letter-spacing:.5px;
    }
    .controls{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    button,select,input{
      padding:8px 10px;
      border-radius:6px;
      border:1px solid var(--border);
      background:#111118;
      color:var(--text);
      font-family:var(--mono);
      font-size:12px;
    }
    button{cursor:pointer}
    button.primary{
      background:var(--accent);
      border-color:var(--accent);
    }
    button.secondary{
      background:#161621;
    }
    .stats{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
      gap:12px;
      margin-bottom:20px;
    }
    .stat{
      background:var(--panel);
      border:1px solid var(--border);
      padding:12px;
      border-radius:var(--radius);
    }
    .stat b{
      font-size:20px;
      color:#fff;
    }
    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
      gap:12px;
    }
    .card{
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:12px;
    }
    .card h3{
      font-family:var(--mono);
      font-size:13px;
      color:var(--neon);
      margin-bottom:8px;
    }
    .meta{
      font-family:var(--mono);
      font-size:11px;
      margin-top:6px;
      color:var(--muted);
      line-height:1.5;
    }
    .desc{
      margin-top:10px;
      font-size:13px;
      color:var(--text);
      line-height:1.45;
    }
    .tag{
      display:inline-block;
      padding:3px 6px;
      border-radius:6px;
      border:1px solid var(--border);
      margin-top:8px;
      margin-right:4px;
      font-size:10px;
      font-family:var(--mono);
    }
    .tag.primary{border-color:var(--accent);color:#fff}
    .tag.sec{border-color:var(--yellow);color:#fde68a}
    .tag.info{border-color:var(--blue);color:#bfdbfe}
    .tag.good{border-color:var(--green);color:#a7f3d0}
    .actions{
      margin-top:12px;
      display:flex;
      gap:6px;
      flex-wrap:wrap
    }
    .modalBack{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.72);
      display:none;
      justify-content:center;
      align-items:center;
      z-index:1000;
      padding:16px;
    }
    .modal{
      background:var(--panel);
      border:1px solid var(--accent);
      padding:20px;
      width:min(900px,95%);
      max-height:90vh;
      overflow:auto;
      border-radius:12px;
    }
    .modal h2{
      color:var(--neon);
      margin-bottom:12px;
    }
    .code{
      background:#0d0d14;
      padding:10px;
      border-radius:8px;
      font-family:var(--mono);
      font-size:11px;
      overflow:auto;
      margin-top:8px;
      white-space:pre-wrap;
      border:1px solid var(--border);
    }
    .priceTable{
      margin-top:10px;
      border-collapse:collapse;
      width:100%;
    }
    .priceTable th,.priceTable td{
      border:1px solid #ddd;
      padding:6px;
      font-size:13px;
      text-align:left;
    }
    .price{font-weight:bold}
    .empty{
      color:var(--muted);
      padding:20px;
      border:1px dashed var(--border);
      border-radius:10px;
      font-family:var(--mono);
      font-size:12px;
    }
    .brief{
      color:#111;
      background:#fff;
      padding:28px;
      font-family:Arial,sans-serif;
      line-height:1.45;
    }
    .brief h1,.brief h2,.brief h3{color:#111}
    .brief table{
      width:100%;
      border-collapse:collapse;
      margin-top:10px;
      margin-bottom:16px;
    }
    .brief th,.brief td{
      border:1px solid #ccc;
      padding:8px;
      font-size:13px;
      text-align:left;
    }
    .brief small{color:#555}
  </style>
</head>
<body>
  <header>
    <div class="brand">Permit Intelligence Engine v10 — Broker War Room</div>
    <div class="controls">
      <select id="buyerFilter">
        <option value="ALL">ALL</option>
        <option value="Supplier">Supplier</option>
        <option value="Subcontractor">Subcontractor</option>
        <option value="Capital">Capital</option>
        <option value="Investor">Investor</option>
        <option value="GC">GC</option>
        <option value="Contractor">Contractor</option>
      </select>
      <input id="lookback" type="number" value="30" min="1" max="365" />
      <button class="primary" id="runBtn">Run Engine</button>
      <button class="secondary" id="demoBtn">Demo Mode</button>
    </div>
  </header>

  <div class="stats">
    <div class="stat"><b id="statCount">0</b><br>Signals</div>
    <div class="stat"><b id="statValue">$0</b><br>Total Value</div>
    <div class="stat"><b id="statMajor">0</b><br>Major</div>
    <div class="stat"><b id="statImmediate">0</b><br>Immediate</div>
  </div>

  <div class="grid" id="grid"></div>

  <div class="modalBack" id="modalBack">
    <div class="modal">
      <h2 id="modalTitle"></h2>
      <div id="modalBody"></div>
      <div style="margin-top:16px">
        <button onclick="closeModal()">Close</button>
      </div>
    </div>
  </div>

  <script>
    const API_URL = "https://data.cityofchicago.org/resource/ydr8-5enu.json";

    const fmt = n =>
      new Intl.NumberFormat("en-US", {
        style: "currency",
        currency: "USD",
        maximumFractionDigits: 0
      }).format(Number(n || 0));

    function closeModal() {
      document.getElementById("modalBack").style.display = "none";
    }

    function openModal(title, html) {
      document.getElementById("modalTitle").innerText = title;
      document.getElementById("modalBody").innerHTML = html;
      document.getElementById("modalBack").style.display = "flex";
    }

    function safeLower(v) {
      return String(v || "").toLowerCase();
    }

    class Engine {
      constructor() {
        this.data = [];
        document.getElementById("runBtn").onclick = () => this.run();
        document.getElementById("demoBtn").onclick = () => this.runDemo();
        document.getElementById("buyerFilter").onchange = () => this.render();
      }

      async run() {
        const lookback = Number(document.getElementById("lookback").value || 30);
        const limit = 250;
        const url = `${API_URL}?$limit=${limit}`;

        try {
          const res = await fetch(url);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const raw = await res.json();
          this.data = raw
            .map(r => this.normalize(r))
            .filter(Boolean)
            .filter(r => r.days <= lookback)
            .sort((a, b) => b.saleability - a.saleability);

          this.render();
        } catch (err) {
          openModal(
            "Fetch Error",
            `<p>Could not load live permit data.</p><div class="code">${String(err)}</div>`
          );
        }
      }

      runDemo() {
        const now = Date.now();
        const daysAgo = d => new Date(now - d * 86400000).toISOString();

        const mock = [
          {
            permit_: "D-1001",
            street_number: "512",
            street_name: "HIGH ST",
            issue_date: daysAgo(4),
            estimated_cost: "220000",
            work_description: "Restaurant tenant improvement and commercial kitchen buildout"
          },
          {
            permit_: "D-1002",
            street_number: "79",
            street_name: "GAY ST",
            issue_date: daysAgo(7),
            estimated_cost: "145000",
            work_description: "Interior restaurant renovation and hood installation"
          },
          {
            permit_: "D-1003",
            street_number: "118",
            street_name: "OAK ST",
            issue_date: daysAgo(5),
            estimated_cost: "950000",
            work_description: "Demolition and new construction mixed-use development"
          },
          {
            permit_: "D-1004",
            street_number: "330",
            street_name: "BROAD ST",
            issue_date: daysAgo(2),
            estimated_cost: "78000",
work_description: "Commercial reroof permit"
          },
          {
            permit_: "D-1005",
            street_number: "812",
            street_name: "LONG ST",
            issue_date: daysAgo(10),
            estimated_cost: "56000",
            work_description: "HVAC replacement and mechanical improvements"
          },
          {
            permit_: "D-1006",
            street_number: "121",
            street_name: "MARKET ST",
            issue_date: daysAgo(18),
            estimated_cost: "0",
            work_description: "Vacant structure remediation and code correction"
          }
        ];

        this.data = mock
          .map(r => this.normalize(r))
          .filter(Boolean)
          .sort((a, b) => b.saleability - a.saleability);

        this.render();
      }

      normalize(r) {
        if (!r.issue_date || !r.street_name) return null;

        const issued = new Date(r.issue_date);
        const days = Math.floor((Date.now() - issued.getTime()) / 86400000);
        const value = Number(r.estimated_cost || 0);
        const desc = String(r.work_description || "");
        const descLower = desc.toLowerCase();

        let primary = "Contractor";
        let secondary = ["Investor"];
        let asset = "Quick Lead Brief";

        if (
          descLower.includes("restaurant") ||
          descLower.includes("kitchen") ||
          descLower.includes("cafe") ||
          descLower.includes("bar")
        ) {
          primary = "Supplier";
          secondary = ["Contractor", "GC"];
          asset = "Restaurant Buildout Brief";
        } else if (
          descLower.includes("demolition") ||
          descLower.includes("new construction") ||
          descLower.includes("mixed-use")
        ) {
          primary = "Capital";
          secondary = ["Investor", "GC"];
          asset = "Capital Memo";
        } else if (
          descLower.includes("roof") ||
          descLower.includes("reroof") ||
          descLower.includes("hvac") ||
          descLower.includes("mechanical") ||
          descLower.includes("electrical") ||
          descLower.includes("plumbing")
        ) {
          primary = "Subcontractor";
          secondary = ["GC"];
          asset = "Quick Lead Brief";
        } else if (
          descLower.includes("vacant") ||
          descLower.includes("code") ||
          descLower.includes("violation") ||
          descLower.includes("unsafe")
        ) {
          primary = "Investor";
          secondary = ["Capital"];
          asset = "Distress Sheet";
        }

        const urgency = Math.max(5, 100 - (days * 2));
        const dealSize =
          value > 1000000 ? 95 :
          value > 500000 ? 85 :
          value > 250000 ? 75 :
          value > 75000 ? 62 :
          value > 0 ? 48 : 35;

        const buyerDemand =
          primary === "Supplier" ? 92 :
          primary === "Subcontractor" ? 86 :
          primary === "Capital" ? 74 :
          primary === "Investor" ? 78 : 70;

        const infoAdvantage =
          descLower.includes("demolition") ? 78 :
          descLower.includes("restaurant") ? 82 :
          descLower.includes("vacant") ? 80 :
          68;

        const easeOfSale =
          primary === "Supplier" ? 90 :
          primary === "Subcontractor" ? 85 :
          primary === "Investor" ? 76 :
          primary === "Capital" ? 60 : 70;

        const saleability = Math.round(
          (urgency + dealSize + buyerDemand + infoAdvantage + easeOfSale) / 5
        );

        return {
          permit: r.permit_ || `permit-${Math.random().toString(36).slice(2, 8)}`,
          address: `${r.street_number || ""} ${r.street_name || ""}`.trim(),
          issued,
          days,
          value,
          desc,
          primary,
          secondary,
          asset,
          saleability,
          immediate: days < 14,
          major: value > 500000
        };
      }

      getFilteredData() {
        const filter = document.getElementById("buyerFilter").value;
        if (filter === "ALL") return this.data;
        return this.data.filter(r =>
          r.primary === filter || r.secondary.includes(filter)
        );
      }

      render() {
        const grid = document.getElementById("grid");
        const rows = this.getFilteredData();

        grid.innerHTML = "";

        document.getElementById("statCount").innerText = rows.length;
        document.getElementById("statValue").innerText = fmt(rows.reduce((s, r) => s + r.value, 0));
        document.getElementById("statMajor").innerText = rows.filter(r => r.major).length;
        document.getElementById("statImmediate").innerText = rows.filter(r => r.immediate).length;

        if (!rows.length) {
          grid.innerHTML = `<div class="empty">No matching signals found.</div>`;
          return;
        }

        rows.forEach(r => {
          const c = document.createElement("div");
          c.className = "card";

          c.innerHTML = `
            <h3>${this.escape(r.address)}</h3>

            <div class="meta">
              <b>Saleability:</b> ${r.saleability}/100<br>
              <b>Value:</b> ${fmt(r.value)}<br>
              <b>Days Since:</b> ${r.days}<br>
              <b>Recommended Asset:</b> ${this.escape(r.asset)}
            </div>

            <div class="desc">${this.escape(r.desc || "No description available.")}</div>

            <div>
              <span class="tag primary">${this.escape(r.primary)}</span>
              ${r.secondary.map(s => `<span class="tag sec">${this.escape(s)}</span>`).join("")}
              ${r.immediate ? `<span class="tag good">Immediate</span>` : ""}
              ${r.major ? `<span class="tag info">Major</span>` : ""}
            </div>

            <div class="actions">
              <button onclick="engine.internal('${this.escapeAttr(r.permit)}')">Internal Intel</button>
              <button onclick="engine.client('${this.escapeAttr(r.permit)}')">Client Brief</button>
            </div>
          `;

          grid.appendChild(c);
        });
      }

      internal(id) {
        const r = this.data.find(x => x.permit === id);
        if (!r) return;

        openModal(
          "Internal Intelligence — " + this.escape(r.address),
          `
            <p><b>Permit:</b> ${this.escape(r.permit)}</p>
            <p><b>Primary Buyer:</b> ${this.escape(r.primary)}</p>
            <p><b>Recommended Asset:</b> ${this.escape(r.asset)}</p>
            <p><b>Opportunity Score:</b> ${r.saleability}/100</p>
            <p><b>Estimated Value:</b> ${fmt(r.value)}</p>
            <p><b>Days Since Permit:</b> ${r.days}</p>
            <p><b>Description:</b> ${this.escape(r.desc)}</p>
            <div class="code">${this.escape(JSON.stringify(r, null, 2))}</div>
          `
        );
      }

      client(id) {
        const r = this.data.find(x => x.permit === id);
        if (!r) return;

        const why = [];
        if (r.immediate) why.push("Fresh permit activity indicates near-term outreach value.");
        if (r.major) why.push("Project size suggests meaningful commercial opportunity.");
        if (r.primary === "Supplier") why.push("This type of project often creates equipment and installation demand.");
        if (r.primary === "Subcontractor") why.push("Trade-specific work typically converts faster when contacted early.");
        if (r.primary === "Capital") why.push("The signal suggests larger capital deployment or redevelopment activity.");
        if (r.primary === "Investor") why.push("The record may indicate distress, repositioning, or off-market opportunity.");

        const briefHtml = `
          <div class="brief">
            <h1>${this.escape(r.asset)}</h1>
            <small>Generated intelligence brief</small>

            <h2>Project Snapshot</h2>
            <table>
              <tr><th>Address</th><td>${this.escape(r.address)}</td></tr>
              <tr><th>Permit ID</th><td>${this.escape(r.permit)}</td></tr>
              <tr><th>Estimated Value</th><td>${fmt(r.value)}</td></tr>
              <tr><th>Opportunity Score</th><td>${r.saleability}/100</td></tr>
              <tr><th>Recommended Buyer</th><td>${this.escape(r.primary)}</td></tr>
              <tr><th>Days Since Permit</th><td>${r.days}</td></tr>
            </table>

            <h2>Executive Summary</h2>
            <p>
              This public permit signal indicates actionable commercial activity that may create
              sales, construction, investment, or supplier opportunity in the next 30–90 days.
            </p>

            <h2>Why This Matters</h2>
            <ul>
              ${why.map(x => `<li>${this.escape(x)}</li>`).join("")}
            </ul>

            <h2>Work Description</h2>
            <p>${this.escape(r.desc)}</p>

            <h2>Recommended Next Action</h2>
            <p>
              Identify the contractor, owner, developer, or operating business tied to this address
              and make early contact with a direct, project-specific offer.
            </p>

            <h2>Pricing Guidance</h2>
            <table class="priceTable">
              <tr><th>Tier</th><th>Suggested Fee</th></tr>
              <tr><td>Quick Lead</td><td class="price">${fmt(49)}</td></tr>
              <tr><td>Enhanced Brief</td><td class="price">${fmt(149)}</td></tr>
              <tr><td>Custom Memo</td><td class="price">${fmt(499)}</td></tr>
            </table>

            <h2>Source</h2>
            <p>Municipal permit records.</p>
          </div>
        `;

        const w = window.open("", "_blank");
        w.document.write(`
          <!DOCTYPE html>
          <html>
          <head>
            <title>${this.escape(r.asset)} - ${this.escape(r.address)}</title>
            <meta charset="UTF-8" />
          </head>
          <body style="margin:0;background:#fff;">
            ${briefHtml}
          </body>
          </html>
        `);
        w.document.close();
      }

      escape(str) {
        return String(str ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      escapeAttr(str) {
        return this.escape(str);
      }
    }

    const engine = new Engine();
  </script>
</body>
</html>
