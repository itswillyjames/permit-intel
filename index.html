<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Permit Intel Terminal v2.1</title>
<style>
body { background:#111; color:#ffa; font-family: "IBM Plex Mono", monospace; }
button { background:#222; color:#ffa; border:1px solid #ffa; padding:5px 10px; margin:2px; cursor:pointer; }
#pipeline { margin-top:1em; }
#briefs { margin-top:1em; white-space:pre-wrap; }
</style>
</head>
<body>
<h1>Permit Intel Terminal v2.1</h1>
<div>
  Select City:
  <button onclick="fetchPermits('chicago')">Chicago</button>
  <button onclick="fetchPermits('seattle')">Seattle</button>
  <button onclick="fetchPermits('cincinnati')">Cincinnati</button>
</div>
<div id="status">Worker: checking…</div>
<div id="pipeline">## Pipeline Status</div>
<div id="briefs">## Briefs</div>

<script>
const workerURL = "https://permit-intel-proxy.trev-tce.workers.dev"

async function checkWorker() {
  try {
    const res = await fetch(workerURL + "/api/health")
    const json = await res.json()
    if(json.ai_groq) document.getElementById('status').textContent = "Worker: connected ✅"
  } catch(e) {
    document.getElementById('status').textContent = "Worker: failed ❌"
  }
}

async function fetchPermits(city) {
  document.getElementById('pipeline').textContent = "Fetching permits…"
  try {
    const res = await fetch(`${workerURL}/api/permits?source=${city}&limit=10`)
    const data = await res.json()
    document.getElementById('pipeline').textContent = `Fetched ${data.length} permits`
    runPipeline(data)
  } catch(e) {
    document.getElementById('pipeline').textContent = "Error fetching permits"
  }
}

async function runPipeline(permits) {
  let briefs = ""
  for(let p of permits){
    // Example brief; replace with AI enrichment
    briefs += `PERMIT: ${p.permit_number || p.id} | VALUE: ${p.value || 'N/A'}\n`
  }
  document.getElementById('briefs').textContent = briefs
}

// Initial Worker check
checkWorker()
</script>
</body>
</html>
