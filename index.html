<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Permit Intelligence Engine v9</title>

<style>
:root{
--bg:#07070b;
--panel:#12121a;
--border:#2a2a38;
--text:#e8e8f2;
--muted:#9aa0b3;
--accent:#ef4444;
--green:#10b981;
--yellow:#f59e0b;
--blue:#3b82f6;
--neon:#39ff14;
--mono:ui-monospace,Menlo,monospace;
}

*{box-sizing:border-box}

body{
background:var(--bg);
color:var(--text);
font-family:system-ui;
padding:20px;
}

header{
display:flex;
justify-content:space-between;
margin-bottom:20px;
}

.brand{
font-family:var(--mono);
color:var(--accent);
}

button,select,input{
padding:8px;
background:#111118;
border:1px solid var(--border);
color:white;
border-radius:6px;
font-family:var(--mono);
}

button.primary{
background:var(--accent);
border-color:var(--accent);
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:12px;
margin-bottom:20px;
}

.stat{
background:var(--panel);
padding:12px;
border-radius:10px;
border:1px solid var(--border);
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
gap:12px;
}

.card{
background:var(--panel);
padding:12px;
border-radius:10px;
border:1px solid var(--border);
}

.card h3{
font-family:var(--mono);
color:var(--neon);
}

.meta{
font-family:var(--mono);
font-size:11px;
color:var(--muted);
}

.tag{
display:inline-block;
padding:3px 6px;
border-radius:6px;
border:1px solid var(--border);
margin-right:4px;
font-size:10px;
}

.capital{border-color:#ef4444}
.contractor{border-color:#10b981}
.supplier{border-color:#3b82f6}
.investor{border-color:#f59e0b}

.actions{
margin-top:10px;
display:flex;
gap:6px;
}

.modalBack{
position:fixed;
inset:0;
background:rgba(0,0,0,.7);
display:none;
align-items:center;
justify-content:center;
}

.modal{
background:var(--panel);
padding:20px;
border-radius:10px;
width:900px;
max-height:90vh;
overflow:auto;
}

.code{
background:#0d0d14;
padding:10px;
border-radius:8px;
font-family:var(--mono);
font-size:11px;
overflow:auto;
}

</style>
</head>

<body>

<header>

<div class="brand">
Permit Intelligence Engine v9 — Broker Console
</div>

<div>
<button class="primary" id="runBtn">Run Engine</button>
</div>

</header>

<div class="stats">

<div class="stat">
<b id="statCount">0</b><br>Signals
</div>

<div class="stat">
<b id="statValue">$0</b><br>Total Value
</div>

<div class="stat">
<b id="statMajor">0</b><br>Major Projects
</div>

<div class="stat">
<b id="statImmediate">0</b><br>Immediate
</div>

</div>

<div class="grid" id="grid"></div>

<div class="modalBack" id="modalBack">
<div class="modal">

<h2 id="modalTitle"></h2>
<div id="modalBody"></div>

<button onclick="closeModal()">Close</button>

</div>
</div>

<script>

const fmt=n=>new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0}).format(n||0)

function closeModal(){
document.getElementById("modalBack").style.display="none"
}

class Engine{

constructor(){
this.data=[]
document.getElementById("runBtn").onclick=()=>this.run()
}

async run(){

const res=await fetch("https://data.cityofchicago.org/resource/ydr8-5enu.json?$limit=200")

const raw=await res.json()

this.data=raw.map(r=>this.normalize(r)).filter(Boolean)

this.data.sort((a,b)=>b.saleability-a.saleability)

this.render()

}

normalize(r){

if(!r.issue_date||!r.street_name)return null

const issued=new Date(r.issue_date)

const days=Math.floor((Date.now()-issued)/86400000)

const value=Number(r.estimated_cost||0)

const desc=(r.work_description||"").toLowerCase()

let primary="Contractor"

let secondary=["Investor"]

if(desc.includes("restaurant")||desc.includes("kitchen")){

primary="Supplier"

secondary=["Contractor"]

}

if(desc.includes("demolition")||desc.includes("new construction")){

primary="Capital"

secondary=["Investor","GC"]

}

if(desc.includes("roof")||desc.includes("hvac")){

primary="Contractor"

secondary=["GC"]

}

let urgency=Math.max(0,100-(days*2))

let deal=value>1000000?95:value>250000?85:value>75000?70:50

let demand=desc.includes("restaurant")?95:80

let ease=primary==="Supplier"?90:primary==="Contractor"?85:70

let saleability=Math.round((urgency+deal+demand+ease)/4)

return{

permit:r.permit_,

address:(r.street_number||"")+" "+(r.street_name||""),

issued,

days,

value,

desc,

primary,

secondary,

saleability,

immediate:days<14

}

}

render(){

const grid=document.getElementById("grid")

grid.innerHTML=""

document.getElementById("statCount").innerText=this.data.length

document.getElementById("statValue").innerText=fmt(this.data.reduce((s,r)=>s+r.value,0))

document.getElementById("statMajor").innerText=this.data.filter(r=>r.value>500000).length

document.getElementById("statImmediate").innerText=this.data.filter(r=>r.immediate).length

this.data.forEach(r=>{

const card=document.createElement("div")

card.className="card"

card.innerHTML=`

<h3>${r.address}</h3>

<div class="meta">

Saleability: ${r.saleability}/100<br>

Value: ${fmt(r.value)}<br>

Days Since: ${r.days}

</div>

<div>

<span class="tag ${r.primary.toLowerCase()}">${r.primary}</span>

${r.secondary.map(s=>`<span class="tag investor">${s}</span>`).join("")}

</div>

<div class="actions">

<button onclick="engine.internal('${r.permit}')">Internal Intel</button>

<button onclick="engine.client('${r.permit}')">Client Brief</button>

</div>

`

grid.appendChild(card)

})

}

internal(id){

const r=this.data.find(x=>x.permit===id)

document.getElementById("modalTitle").innerText="Internal Intelligence — "+r.address

document.getElementById("modalBody").innerHTML=`

<p><b>Opportunity Score:</b> ${r.saleability}</p>

<p><b>Estimated Value:</b> ${fmt(r.value)}</p>

<p><b>Days Since Permit:</b> ${r.days}</p>

<div class="code">${JSON.stringify(r,null,2)}</div>

`

document.getElementById("modalBack").style.display="flex"

}

client(id){

const r=this.data.find(x=>x.permit===id)

const w=window.open("")

w.document.write(`

<h1>Construction Intelligence Brief</h1>

<p><b>Address:</b> ${r.address}</p>

<p><b>Estimated Project Value:</b> ${fmt(r.value)}</p>

<p><b>Opportunity Score:</b> ${r.saleability}/100</p>

<h2>Executive Summary</h2>

<p>

Municipal permit records indicate construction activity that may require contractor services or supplier engagement within the next 30–90 days.

</p>

<h2>Opportunity Details</h2>

<ul>

<li>Permit issued ${r.days} days ago</li>

<li>Estimated construction value ${fmt(r.value)}</li>

<li>Recommended buyer category: ${r.primary}</li>

</ul>

<h2>Recommended Action</h2>

<p>

Reach out to the project developer or general contractor to introduce services relevant to this project.

</p>

<h2>Source</h2>

<p>Municipal permit records</p>

`)

}

}

const engine=new Engine()

</script>

</body>
</html>
