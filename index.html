<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Permit Arbitrage Broker Command Center v5</title>

<style>
:root{
--bg:#0b0b0f;
--panel:#16161d;
--border:#26262f;
--text:#e5e7eb;
--accent:#ef4444;
--neon:#39ff14;
--green:#10b981;
--yellow:#f59e0b;
--blue:#3b82f6;
--mono:ui-monospace, Menlo, monospace;
--sans:system-ui;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);padding:20px}
header{display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:20px;border-bottom:1px solid var(--border);padding-bottom:12px}
h1{font-family:var(--mono);color:var(--accent);font-size:18px}
button,select{
background:var(--panel);
border:1px solid var(--border);
color:var(--text);
padding:6px 10px;
font-family:var(--mono);
font-size:12px;
cursor:pointer;
}
button.primary{background:var(--accent)}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:15px;margin:20px 0}
.stat{background:var(--panel);padding:12px;border-left:3px solid var(--accent)}
.stat.green{border-left-color:var(--green)}
.stat.yellow{border-left-color:var(--yellow)}
.stat.blue{border-left-color:var(--blue)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:15px}
.card{background:var(--panel);border:1px solid var(--border);padding:14px}
.title{font-family:var(--mono);color:var(--neon)}
.money{color:var(--green)}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);display:none;justify-content:center;align-items:center}
.modal-content{background:var(--panel);border:1px solid var(--accent);padding:20px;width:700px;max-width:95%;max-height:90%;overflow:auto;font-family:var(--mono)}
.close-btn{margin-top:12px;background:var(--accent);border:none;padding:6px 10px;cursor:pointer}
</style>
</head>
<body>

<header>
<h1>Permit Arbitrage Broker Command Center v5</h1>
<button class="primary" onclick="engine.run()">Run Engine</button>
<button onclick="engine.generateDossier()">Dossier</button>
</header>

<div class="stats">
<div class="stat">Signals <div id="stat-signals"></div></div>
<div class="stat green">Total Pipeline <div id="stat-value"></div></div>
<div class="stat yellow">Major <div id="stat-major"></div></div>
</div>

<div class="grid" id="grid"></div>

<div class="modal" id="modal">
<div class="modal-content" id="modal-content"></div>
</div>

<script>

class Engine{
constructor(){
this.data=[];
this.sources={
"Chicago":{url:"https://data.cityofchicago.org/resource/ydr8-5enu.json",date:"issue_date"}
};
}

money(n){return new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0}).format(n||0)}

safeFloat(v){let n=parseFloat(v);return isNaN(n)?0:n;}

async run(){
let raw=[];
for(let [city,cfg] of Object.entries(this.sources)){
let url=`${cfg.url}?$limit=1500&$order=${cfg.date} DESC`;
let rows=await fetch(url).then(r=>r.json());
rows.forEach(r=>{
let o=this.normalize(city,r);
if(o)raw.push(o);
});
}
this.process(raw);
this.render();
}

normalize(city,r){
let o={};
o.city=city;
o.address=[r.street_number,r.street_direction,r.street_name,r.suffix].filter(Boolean).join(" ").toUpperCase();
o.description=(r.work_description||"").toLowerCase();
o.value=this.safeFloat(r.estimated_cost||r.total_estimated_cost||0);
o.issued_date=r.issue_date||"";
if(!o.address||!o.issued_date)return null;

let issued=new Date(o.issued_date.split('T')[0]);
o.days_since_issue=Math.floor((Date.now()-issued)/(1000*60*60*24));

return o;
}

inferValue(r){
if(r.value>0)return r.value;

let desc=r.description;
let base=150000; // minimum fallback

if(desc.includes("new construction"))base=900000;
if(desc.includes("high rise"))base=5000000;
if(desc.includes("addition"))base=300000;
if(desc.includes("demolition"))base=200000;
if(desc.includes("electrical"))base=100000;
if(desc.includes("plumbing"))base=80000;
if(desc.includes("roof"))base=70000;

return base;
}

process(records){
this.data=records.map(r=>{

r.value=this.inferValue(r);

r.flip_type=r.value>1000000?"Institutional Capital Play":
r.value>300000?"Major Build":
r.value>100000?"Mid Build":"Trade Flip";

r.arb=Math.min(20,Math.round((r.value/100000)));

r.confidence=Math.max(60,Math.min(98,100-(r.days_since_issue*0.3)));

return r;

}).sort((a,b)=>b.arb-a.arb);
}

render(){
document.getElementById("stat-signals").innerText=this.data.length;
document.getElementById("stat-value").innerText=this.money(this.data.reduce((s,r)=>s+r.value,0));
document.getElementById("stat-major").innerText=this.data.filter(r=>r.arb>=15).length;

let grid=document.getElementById("grid");
grid.innerHTML=this.data.slice(0,12).map(r=>`
<div class="card">
<div class="title">${r.address}</div>
<div>${r.city}</div>
<div class="money">${this.money(r.value)}</div>
<div>Flip: ${r.flip_type}</div>
<div>ARB: ${r.arb}</div>
<div>Confidence: ${r.confidence}%</div>
<button onclick="engine.showIntel('${r.address}')">Intelligence</button>
</div>`).join("");
}

showIntel(address){
let r=this.data.find(x=>x.address===address);
if(!r)return;

let monetization=[
"Sell early intel to subcontractors",
"Broker introduction to capital source",
"Package with adjacent permits",
"Offer ongoing tracking subscription"
];

let why=[
"Early awareness before mass bidding",
"Reduced competition window",
"Capital positioning advantage",
"Trade stacking visibility"
];

let timeline=r.days_since_issue<7?"Immediate action recommended":
r.days_since_issue<30?"Active sourcing phase":"Mid execution phase";

let html=`
<h2>Deal Monetization Blueprint</h2>
<b>Project:</b> ${r.address}<br>
<b>Value:</b> ${this.money(r.value)}<br>
<b>Flip Type:</b> ${r.flip_type}<br>
<b>ARB:</b> ${r.arb}<br>
<b>Confidence:</b> ${r.confidence}%<br>
<b>Days Since Issued:</b> ${r.days_since_issue}<br>
<hr>
<h3>Ways To Sell This</h3>
<ul>${monetization.map(m=>`<li>${m}</li>`).join("")}</ul>
<h3>Why Buyers Pay</h3>
<ul>${why.map(w=>`<li>${w}</li>`).join("")}</ul>
<h3>Timeline Leverage</h3>
${timeline}
<br><br>
<b>Estimated Packaging Value:</b> ${this.money(monetization.length*1000)}
<br><br>
<button class="close-btn" onclick="document.getElementById('modal').style.display='none'">Close</button>
`;

document.getElementById("modal-content").innerHTML=html;
document.getElementById("modal").style.display="flex";
}

generateDossier(){
let html="<h1>Permit Intelligence Dossier</h1><hr>";
this.data.slice(0,10).forEach(r=>{
html+=`
<h3>${r.address}</h3>
<p>Value: ${this.money(r.value)}</p>
<p>Flip: ${r.flip_type}</p>
<p>ARB: ${r.arb}</p>
<p>Confidence: ${r.confidence}%</p>
<hr>`;
});
let w=window.open("","_blank");
w.document.write(html);
w.document.close();
}

}

let engine=new Engine();

</script>
</body>
</html>
