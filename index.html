<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Permit Intelligence Terminal</title>
<style>
  body { background: #111; color: #0f0; font-family: monospace; margin:0; padding:0;}
  #terminal { padding: 20px; height: 90vh; overflow-y: scroll;}
  button { background:#222;color:#0f0;border:1px solid #0f0;padding:5px 10px;margin:5px;cursor:pointer;}
  pre { background:#111;color:#0f0;padding:10px;margin-top:10px;overflow-x:auto;}
  .panel { border-top:1px solid #0f0; padding-top:10px; margin-top:10px;}
</style>
</head>
<body>

<div id="terminal">
  <h2>Permit Intelligence Terminal</h2>
  <button id="health-btn">HEALTH</button>
  <button id="run-engine-btn">RUN ENGINE</button>
  <button id="enrich-btn">ENRICH</button>

  <div class="panel">
    <h3>Pipeline Output</h3>
    <pre id="pipeline-output">No data yet.</pre>
  </div>

  <div class="panel">
    <h3>Enrichment Output</h3>
    <pre id="enrichment-panel">No enrichment yet.</pre>
  </div>
</div>

<script>
const terminal = document.getElementById('terminal');
const pipelineOutput = document.getElementById('pipeline-output');
const enrichmentPanel = document.getElementById('enrichment-panel');

let selectedLead = null; // Placeholder, replace with actual lead selection logic
let leads = [
  { contractor_name: "Treewright Construction Services LLC", address: "1504 N Hudson Ave", est_value: "$2.1M" }
];
selectedLead = leads[0];

// HEALTH check
document.getElementById('health-btn').addEventListener('click', async () => {
  try {
    const resp = await fetch('/api/health');
    const data = await resp.json();
    pipelineOutput.innerText = JSON.stringify(data, null, 2);
  } catch(err) {
    pipelineOutput.innerText = 'Health check failed: ' + err;
  }
});

// RUN ENGINE (simulated pipeline)
document.getElementById('run-engine-btn').addEventListener('click', async () => {
  pipelineOutput.innerText = 'Running pipeline...';
  try {
    // Mock fetch example
    await new Promise(r => setTimeout(r, 1000));
    pipelineOutput.innerText = JSON.stringify(selectedLead, null, 2);
  } catch(err) {
    pipelineOutput.innerText = 'Pipeline failed: ' + err;
  }
});

// ENRICH button
document.getElementById('enrich-btn').addEventListener('click', async () => {
  if (!selectedLead) return alert('No lead selected!');
  enrichmentPanel.innerText = 'Enriching lead...';

  try {
    const resp = await fetch('/api/enrich', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(selectedLead)
    });
    const enriched = await resp.json();
    enrichmentPanel.innerText = JSON.stringify(enriched.enrichment, null, 2);
  } catch(err) {
    console.error('Enrichment failed:', err);
    enrichmentPanel.innerText = 'Enrichment failed: ' + err;
  }
});
</script>

</body>
</html>
