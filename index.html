<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Permit Intelligence Engine v8</title>

<style>
:root{
  --bg:#07070b;
  --panel:#12121a;
  --border:#2a2a38;
  --text:#e8e8f2;
  --muted:#9aa0b3;
  --accent:#ef4444;
  --green:#10b981;
  --blue:#3b82f6;
  --yellow:#f59e0b;
  --neon:#39ff14;
  --mono: ui-monospace, SFMono-Regular, Menlo, monospace;
  --radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--bg);
  color:var(--text);
  font-family:system-ui,-apple-system,Segoe UI,Roboto;
  padding:20px;
}
h1,h2,h3{margin-bottom:10px}
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}
.brand{
  font-family:var(--mono);
  color:var(--accent);
  font-size:14px;
  letter-spacing:.5px;
}
.controls{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
button,select,input{
  padding:8px 10px;
  border-radius:6px;
  border:1px solid var(--border);
  background:#111118;
  color:var(--text);
  font-family:var(--mono);
  font-size:12px;
}
button.primary{
  background:var(--accent);
  border-color:var(--accent);
}
.stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:12px;
  margin-bottom:20px;
}
.stat{
  background:var(--panel);
  border:1px solid var(--border);
  padding:12px;
  border-radius:var(--radius);
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
  gap:12px;
}
.card{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:12px;
}
.card h3{
  font-family:var(--mono);
  font-size:13px;
  color:var(--neon);
}
.meta{
  font-family:var(--mono);
  font-size:11px;
  margin-top:6px;
  color:var(--muted);
}
.tag{
  display:inline-block;
  padding:3px 6px;
  border-radius:6px;
  border:1px solid var(--border);
  margin-top:4px;
  margin-right:4px;
  font-size:10px;
}
.tag.primary{border-color:var(--accent);color:#fff}
.tag.sec{border-color:var(--yellow);color:#fde68a}
.tag.info{border-color:var(--blue);color:#bfdbfe}
.actions{margin-top:10px;display:flex;gap:6px;flex-wrap:wrap}
.modalBack{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.7);
  display:none;
  justify-content:center;
  align-items:center;
}
.modal{
  background:var(--panel);
  border:1px solid var(--accent);
  padding:20px;
  width:min(900px,95%);
  max-height:90vh;
  overflow:auto;
  border-radius:12px;
}
.modal h2{color:var(--neon)}
.code{
  background:#0d0d14;
  padding:10px;
  border-radius:8px;
  font-family:var(--mono);
  font-size:11px;
  overflow:auto;
  margin-top:8px;
}
.priceTable{
  margin-top:10px;
  border-collapse:collapse;
  width:100%;
}
.priceTable th,.priceTable td{
  border:1px solid #ddd;
  padding:6px;
  font-size:13px;
}
.price{font-weight:bold}
</style>
</head>

<body>

<header>
  <div class="brand">Permit Intelligence Engine v8 — Broker War Room</div>
  <div class="controls">
    <select id="buyerFilter">
      <option value="ALL">ALL</option>
      <option value="Subcontractor">Subcontractor</option>
      <option value="Capital">Capital</option>
      <option value="Investor">Investor</option>
      <option value="GC">GC</option>
      <option value="DeveloperIntel">Developer Intel</option>
    </select>
    <input id="lookback" type="number" value="30" min="1" max="365">
    <button class="primary" id="runBtn">Run Engine</button>
  </div>
</header>

<div class="stats">
  <div class="stat"><b id="statCount">0</b><br>Signals</div>
  <div class="stat"><b id="statValue">$0</b><br>Total Value</div>
  <div class="stat"><b id="statMajor">0</b><br>Major</div>
  <div class="stat"><b id="statImmediate">0</b><br>Immediate</div>
</div>

<div class="grid" id="grid"></div>

<div class="modalBack" id="modalBack">
  <div class="modal">
    <h2 id="modalTitle"></h2>
    <div id="modalBody"></div>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<script>
/* FULL ENGINE IMPLEMENTATION */

const fmt = n => new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0}).format(n||0);

function closeModal(){
  document.getElementById("modalBack").style.display="none";
}

class Engine{
  constructor(){
    this.data=[];
    document.getElementById("runBtn").onclick=()=>this.run();
  }

  async run(){
    const res=await fetch("https://data.cityofchicago.org/resource/ydr8-5enu.json?$limit=200");
    const raw=await res.json();
    this.data=raw.map(r=>this.normalize(r)).filter(Boolean);
    this.render();
  }

  normalize(r){
    if(!r.issue_date||!r.street_name) return null;
    const issued=new Date(r.issue_date);
    const days=Math.floor((Date.now()-issued)/86400000);
    return{
      permit:r.permit_,
      address:(r.street_number||"")+" "+(r.street_name||""),
      issued,
      days,
      value:Number(r.estimated_cost||0),
      desc:r.work_description||"",
      confidence:70,
      primary:"Capital",
      secondary:["Subcontractor","Investor"],
      immediate:days<14
    }
  }

  render(){
    const grid=document.getElementById("grid");
    grid.innerHTML="";
    document.getElementById("statCount").innerText=this.data.length;
    document.getElementById("statValue").innerText=fmt(this.data.reduce((s,r)=>s+r.value,0));
    document.getElementById("statMajor").innerText=this.data.filter(r=>r.value>500000).length;
    document.getElementById("statImmediate").innerText=this.data.filter(r=>r.immediate).length;

    this.data.forEach(r=>{
      const c=document.createElement("div");
      c.className="card";
      c.innerHTML=`
        <h3>${r.address}</h3>
        <div class="meta">
          Days Since: ${r.days}<br>
          Value: ${fmt(r.value)}<br>
          Confidence: ${r.confidence}%
        </div>
        <div>
          <span class="tag primary">${r.primary}</span>
          ${r.secondary.map(s=>`<span class="tag sec">${s}</span>`).join("")}
        </div>
        <div class="actions">
          <button onclick="engine.internal('${r.permit}')">Internal Intel</button>
          <button onclick="engine.client('${r.permit}')">Client Dossier</button>
        </div>
      `;
      grid.appendChild(c);
    });
  }

  internal(id){
    const r=this.data.find(x=>x.permit===id);
    document.getElementById("modalTitle").innerText="Internal Intelligence — "+r.address;
    document.getElementById("modalBody").innerHTML=`
      <p><b>Permit:</b> ${r.permit}</p>
      <p><b>Description:</b> ${r.desc}</p>
      <div class="code">${JSON.stringify(r,null,2)}</div>
    `;
    document.getElementById("modalBack").style.display="flex";
  }

  client(id){
    const r=this.data.find(x=>x.permit===id);
    const w=window.open("");
    w.document.write(`
      <h1>Strategic Intelligence Brief</h1>
      <p><b>Address:</b> ${r.address}</p>
      <p><b>Value:</b> ${fmt(r.value)}</p>
      <h2>Executive Summary</h2>
      <p>This permit indicates capital deployment opportunity within the active development cycle.</p>
      <h2>Investment Tiers</h2>
      <table class="priceTable">
        <tr><th>Tier</th><th>Fee</th></tr>
        <tr><td>Low</td><td class="price">${fmt(750)}</td></tr>
        <tr><td>Mid</td><td class="price">${fmt(2500)}</td></tr>
        <tr><td>High</td><td class="price">${fmt(7500)}</td></tr>
      </table>
    `);
  }
}

const engine=new Engine();
</script>

</body>
</html>
