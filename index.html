<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Temporal Construction Engine</title>
  <style>
    :root {
      --bg-dark: #09090b;
      --bg-panel: #18181b;
      --bg-hover: #27272a;
      --text-main: #f4f4f5;
      --text-muted: #a1a1aa;
      --accent: #3b82f6;
      --now: #ef4444;
      --next: #eab308;
      --latent: #8b5cf6;
      --border: #3f3f46;
      --good: #10b981;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Inter, Arial, sans-serif;
    }

    body {
      background: var(--bg-dark);
      color: var(--text-main);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--bg-panel);
      gap: 16px;
    }

    header h1 {
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 600;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .tabs {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .tab {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      padding: 6px 8px;
      text-transform: uppercase;
    }

    .tab.active {
      color: var(--text-main);
      border-bottom: 2px solid var(--accent);
    }

    .run-btn {
      color: var(--accent);
      font-weight: 700;
    }

    .status {
      font-size: 12px;
      color: var(--text-muted);
      margin-left: 8px;
    }

    main {
      display: grid;
      grid-template-columns: 360px 1fr 360px;
      flex: 1;
      overflow: hidden;
    }

    .col {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      background: var(--bg-dark);
      position: relative;
      min-width: 0;
    }

    .col:last-child {
      border-right: none;
    }

    .col-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-panel);
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--text-muted);
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .sub-tabs {
      display: flex;
      gap: 8px;
    }

    .sub-tab {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 10px;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      text-transform: uppercase;
    }

    .sub-tab.active {
      background: var(--bg-hover);
      color: var(--text-main);
      border-color: var(--accent);
    }

    .card {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
    }

    .card:hover {
      background: var(--bg-hover);
    }

    .card.selected {
      background: var(--bg-hover);
      border-left: 3px solid var(--accent);
    }

    .tag {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 4px;
      display: inline-block;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    .tag.now {
      background: rgba(239, 68, 68, 0.2);
      color: var(--now);
    }

    .tag.next {
      background: rgba(234, 179, 8, 0.2);
      color: var(--next);
    }

    .tag.latent {
      background: rgba(139, 92, 246, 0.2);
      color: var(--latent);
    }

    .tag.entity {
      background: rgba(59, 130, 246, 0.2);
      color: var(--accent);
    }

    .card-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
      text-transform: capitalize;
    }

    .card-meta {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 3px;
      word-break: break-word;
    }

    .detail-view,
    .conversion-panel {
      padding: 24px;
    }

    .detail-section {
      margin-bottom: 24px;
    }

    .detail-section h3 {
      font-size: 11px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 4px;
    }

    .data-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      font-size: 13px;
    }

    .data-label {
      color: var(--text-muted);
      font-size: 11px;
      margin-bottom: 3px;
    }

    .data-value {
      font-weight: 500;
      word-break: break-word;
    }

    .buyer-match {
      background: var(--bg-panel);
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 4px;
      margin-bottom: 8px;
    }

    .buyer-match-header {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 4px;
      gap: 12px;
    }

    .buyer-match-score {
      color: var(--good);
      white-space: nowrap;
    }

    .buyer-match-why {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.45;
    }

    .btn {
      width: 100%;
      padding: 12px;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      color: var(--text-main);
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      cursor: pointer;
      margin-bottom: 12px;
      border-radius: 4px;
    }

    .btn:hover {
      border-color: var(--accent);
      background: var(--bg-hover);
    }

    .btn.primary {
      background: var(--accent);
      border-color: var(--accent);
    }

    .btn.primary:hover {
      background: #2563eb;
    }

    #output-area {
      width: 100%;
      height: 260px;
      background: #000;
      border: 1px solid var(--border);
      color: var(--good);
      padding: 12px;
      font-family: monospace;
      font-size: 11px;
      resize: none;
      margin-top: 16px;
      outline: none;
    }

    .copy-btn {
      margin-top: 8px;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      color: var(--text-main);
      padding: 8px;
      font-size: 11px;
      cursor: pointer;
      border-radius: 4px;
      width: 100%;
    }

    .copy-btn:hover {
      background: var(--bg-hover);
    }

    .loader {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--accent);
      animation: load 1.5s infinite;
      display: none;
    }

    @keyframes load {
      0% { width: 0; left: 0; }
      50% { width: 100%; left: 0; }
      100% { width: 100%; left: 100%; }
    }

    .hidden {
      display: none !important;
    }

    pre {
      white-space: pre-wrap;
      word-break: break-word;
      background: var(--bg-panel);
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-muted);
      font-size: 11px;
      line-height: 1.4;
    }

    .empty-state {
      padding: 20px;
      color: var(--text-muted);
      font-size: 13px;
      line-height: 1.5;
    }

    @media (max-width: 1200px) {
      main {
        grid-template-columns: 320px 1fr 320px;
      }
    }

    @media (max-width: 980px) {
      body {
        overflow: auto;
      }

      main {
        grid-template-columns: 1fr;
        overflow: auto;
      }

      .col {
        min-height: 320px;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }

      .col:last-child {
        border-bottom: none;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Temporal Construction Intelligence</h1>
    <div class="tabs">
      <button class="tab active" data-tab="signals" onclick="switchMainTab('signals', this)">Signals</button>
      <button class="tab" data-tab="entities" onclick="switchMainTab('entities', this)">Entities</button>
      <button class="tab" data-tab="zones" onclick="switchMainTab('zones', this)">Zones</button>
      <button class="tab run-btn" onclick="triggerCron()">[Run Engines]</button>
      <span class="status" id="status-text">Ready</span>
    </div>
  </header>

  <main>
    <div class="col">
      <div class="loader" id="loader"></div>
      <div class="col-header">
        <span id="list-title">Intelligence Feed</span>
        <div id="zone-subtabs" class="sub-tabs hidden">
          <button class="sub-tab active" onclick="loadZones('zip', this)">ZIPs</button>
          <button class="sub-tab" onclick="loadZones('corridor', this)">Corridors</button>
        </div>
      </div>
      <div id="list-container"></div>
    </div>

    <div class="col">
      <div class="col-header">Intelligence Detail</div>
      <div id="detail-container" class="detail-view">
        <p style="color:var(--text-muted); font-size:13px;">Select an item from the list to analyze.</p>
      </div>
    </div>

    <div class="col">
      <div class="col-header">Asset Generation</div>
      <div class="conversion-panel">
        <button class="btn primary" onclick="generateOutput('Contractor Lead Brief')">Contractor Brief</button>
        <button class="btn" onclick="generateOutput('Capital Intelligence Brief')">Capital Brief</button>
        <button class="btn" onclick="generateOutput('Distress Opportunity Brief')">Distress Brief</button>
        <button class="btn" onclick="generateOutput('Outreach Copy')">Outreach Email Draft</button>
        <textarea id="output-area" readonly placeholder="Awaiting asset generation..."></textarea>
        <button class="copy-btn" onclick="copyOutput()">Copy to Clipboard</button>
      </div>
    </div>
  </main>

  <script>
    const API_BASE = 'https://tce-api.trev-tce.workers.dev/api';

    const state = {
      data: [],
      selected: null,
      currentTab: 'signals'
    };

    function setStatus(message) {
      document.getElementById('status-text').textContent = message;
    }

    function showLoader(show) {
      document.getElementById('loader').style.display = show ? 'block' : 'none';
    }

    async function api(path, opts = {}) {
      const res = await fetch(API_BASE + path, opts);
      const text = await res.text();

      if (!res.ok) {
        throw new Error(text || `Request failed: ${res.status}`);
      }

      try {
        return JSON.parse(text);
      } catch {
        throw new Error('API did not return valid JSON');
      }
    }

    function safeJson(v, fallback) {
      try {
        return JSON.parse(v);
      } catch {
        return fallback;
      }
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;');
    }

    function fmtSignalType(v) {
      return String(v || 'signal').replaceAll('_', ' ');
    }

    function fmtDate(v) {
      if (!v) return 'N/A';
      return String(v);
    }

    function fmtScore(v) {
      const n = Number(v);
      return Number.isFinite(n) ? n : 0;
    }

    function clearSelection() {
      state.selected = null;
      document.getElementById('detail-container').innerHTML =
        '<p style="color:var(--text-muted); font-size:13px;">Select an item from the list to analyze.</p>';
      document.getElementById('output-area').value = '';
    }

    async function init() {
      await loadSignals();
    }

    async function triggerCron() {
      try {
        showLoader(true);
        setStatus('Running engines...');
        const result = await api('/cron/fetch', { method: 'POST' });
        setStatus(`Inserted ${result.inserted || 0} permits`);
        if (state.currentTab === 'signals') {
          await loadSignals();
        } else if (state.currentTab === 'entities') {
          await loadEntities();
        } else if (state.currentTab === 'zones') {
          const activeZoneBtn = document.querySelector('#zone-subtabs .sub-tab.active');
          if (activeZoneBtn && activeZoneBtn.textContent.toLowerCase().includes('corridor')) {
            await loadZones('corridor', activeZoneBtn);
          } else {
            await loadZones('zip', document.querySelector('#zone-subtabs .sub-tab'));
          }
        }
      } catch (e) {
        setStatus('Run failed');
        alert('Fetch failed: ' + e.message);
      } finally {
        showLoader(false);
      }
    }

    async function switchMainTab(tab, btn) {
      document.querySelectorAll('.tab[data-tab]').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');

      state.currentTab = tab;
      clearSelection();
      document.getElementById('zone-subtabs').classList.add('hidden');

      if (tab === 'signals') {
        document.getElementById('list-title').innerText = 'Intelligence Feed';
        await loadSignals();
      } else if (tab === 'entities') {
        document.getElementById('list-title').innerText = 'Active Entities';
        await loadEntities();
      } else if (tab === 'zones') {
        document.getElementById('list-title').innerText = 'Zone Analysis';
        document.getElementById('zone-subtabs').classList.remove('hidden');
        const first = document.querySelector('#zone-subtabs .sub-tab');
        document.querySelectorAll('.sub-tab').forEach(t => t.classList.remove('active'));
        first.classList.add('active');
        await loadZones('zip', first);
      }
    }

    async function loadSignals() {
      showLoader(true);
      setStatus('Loading signals...');
      try {
        state.data = await api('/signals');
        renderList(state.data, 'signal');
        setStatus(`${state.data.length} signals loaded`);
      } catch (e) {
        setStatus('Signals failed');
        alert('Signals failed: ' + e.message);
      } finally {
        showLoader(false);
      }
    }

    async function loadEntities() {
      showLoader(true);
      setStatus('Loading entities...');
      try {
        state.data = await api('/entities');
        renderList(state.data, 'entity');
        setStatus(`${state.data.length} entities loaded`);
      } catch (e) {
        setStatus('Entities failed');
        alert('Entities failed: ' + e.message);
      } finally {
        showLoader(false);
      }
    }

    async function loadZones(type, btn) {
      document.querySelectorAll('.sub-tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');

      showLoader(true);
      setStatus(`Loading ${type === 'zip' ? 'ZIPs' : 'corridors'}...`);
      clearSelection();

      try {
        state.data = await api(type === 'zip' ? '/zip-stats' : '/corridors');
        renderList(state.data, type);
        setStatus(`${state.data.length} ${type === 'zip' ? 'ZIPs' : 'corridors'} loaded`);
      } catch (e) {
        setStatus('Zones failed');
        alert('Zones failed: ' + e.message);
      } finally {
        showLoader(false);
      }
    }

    function renderList(items, type) {
      const container = document.getElementById('list-container');
      container.innerHTML = '';

      if (!items || !items.length) {
        container.innerHTML = `
          <div class="empty-state">
            No results found.<br /><br />
            Try clicking <strong>[Run Engines]</strong> to refresh the live dataset.
          </div>
        `;
        return;
      }

      items.forEach(item => {
        const div = document.createElement('div');
        div.className = 'card';
        div.onclick = () => selectItem(item, type, div);

        if (type === 'signal') {
          const horiz = String(item.temporal_horizon || 'LATENT').toLowerCase();
          div.innerHTML = `
            <div class="tag ${horiz}">${item.temporal_horizon || 'LATENT'}</div>
            <div class="card-title">${fmtSignalType(item.signal_type)}</div>
            <div class="card-meta">${item.address || item.target_id || item.id || 'Unknown target'}</div>
            <div class="card-meta">Score: ${fmtScore(item.score)}</div>
          `;
        } else if (type === 'entity') {
          div.innerHTML = `
            <div class="tag entity">ENTITY</div>
            <div class="card-title">${item.display_name || 'Unknown'}</div>
            <div class="card-meta">Permits: ${item.total_permits || 0} | ZIPs: ${item.zip_count || 0}</div>
            <div class="card-meta">First seen: ${fmtDate(item.first_seen)}</div>
          `;
        } else if (type === 'zip') {
          div.innerHTML = `
            <div class="card-title">ZIP ${item.zip_code || 'Unknown'}</div>
            <div class="card-meta">Permits: ${item.permit_count || 0}</div>
            <div class="card-meta">Acceleration: ${Number(item.acceleration_pct || 0).toFixed(1)}%</div>
          `;
        } else if (type === 'corridor') {
          div.innerHTML = `
            <div class="card-title">${item.street || 'Unknown'} Corridor</div>
            <div class="card-meta">Active Permits: ${item.permit_count || 0} | Sub Score: ${item.sub_score || 0}</div>
            <div class="card-meta">MEP: ${item.mep_count || 0} | Struct: ${item.structure_count || 0} | Finish: ${item.finish_count || 0}</div>
          `;
        }

        container.appendChild(div);
      });
    }

    function selectItem(item, type, element) {
      document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
      element.classList.add('selected');
      state.selected = { item, type };

      let html = '';

      if (type === 'signal') {
        const meta = safeJson(item.metadata, {});
        const buyers = safeJson(item.best_buyers, []);

        html = `
          <div class="detail-section">
            <h3>Signal Vector</h3>
            <div class="data-grid">
              <div><div class="data-label">Type</div><div class="data-value">${fmtSignalType(item.signal_type)}</div></div>
              <div><div class="data-label">Horizon</div><div class="data-value">${item.temporal_horizon || ''}</div></div>
              <div><div class="data-label">Target</div><div class="data-value">${item.target_id || item.address || ''}</div></div>
              <div><div class="data-label">Score</div><div class="data-value">${fmtScore(item.score)}</div></div>
              <div><div class="data-label">Address</div><div class="data-value">${item.address || ''}</div></div>
              <div><div class="data-label">Permit Type</div><div class="data-value">${item.permit_type || ''}</div></div>
              <div><div class="data-label">City</div><div class="data-value">${item.city || ''}</div></div>
              <div><div class="data-label">Issued Date</div><div class="data-value">${item.issued_date || 'N/A'}</div></div>
            </div>
          </div>
          <div class="detail-section">
            <h3>Metadata</h3>
            <pre>${escapeHtml(JSON.stringify(meta, null, 2))}</pre>
          </div>
          <div class="detail-section">
            <h3>Buyer Match Routing</h3>
            ${buyers.length ? buyers.map(b => `
              <div class="buyer-match">
                <div class="buyer-match-header">
                  <span>${b.buyer_type || ''}</span>
                  <span class="buyer-match-score">${b.fit_score || 0} FIT</span>
                </div>
                <div class="buyer-match-why">${b.why || ''}</div>
              </div>
            `).join('') : '<div class="buyer-match"><div class="buyer-match-why">No buyer matches available.</div></div>'}
          </div>
        `;
      } else if (type === 'entity') {
        html = `
          <div class="detail-section">
            <h3>Entity Dossier</h3>
            <div class="data-grid">
              <div><div class="data-label">Name</div><div class="data-value">${item.display_name || ''}</div></div>
              <div><div class="data-label">Total Permits</div><div class="data-value">${item.total_permits || 0}</div></div>
              <div><div class="data-label">ZIP Count</div><div class="data-value">${item.zip_count || 0}</div></div>
              <div><div class="data-label">First Seen</div><div class="data-value">${fmtDate(item.first_seen)}</div></div>
              <div><div class="data-label">Last Seen</div><div class="data-value">${fmtDate(item.last_seen)}</div></div>
            </div>
          </div>
          <div class="detail-section">
            <h3>Why This Matters</h3>
            <pre>${escapeHtml(JSON.stringify(item, null, 2))}</pre>
          </div>
        `;
      } else if (type === 'corridor') {
        html = `
          <div class="detail-section">
            <h3>Corridor Intelligence</h3>
            <div class="data-grid">
              <div><div class="data-label">Street</div><div class="data-value">${item.street || ''}</div></div>
              <div><div class="data-label">Permits</div><div class="data-value">${item.permit_count || 0}</div></div>
              <div><div class="data-label">MEP</div><div class="data-value">${item.mep_count || 0}</div></div>
              <div><div class="data-label">Structure</div><div class="data-value">${item.structure_count || 0}</div></div>
              <div><div class="data-label">Finish</div><div class="data-value">${item.finish_count || 0}</div></div>
              <div><div class="data-label">Sub Score</div><div class="data-value">${item.sub_score || 0}</div></div>
            </div>
          </div>
          <div class="detail-section">
            <h3>Why This Matters</h3>
            <p style="color:var(--text-muted); font-size:13px; line-height:1.5;">
              High-activity corridors can indicate concentrated bidding opportunity for subs, suppliers, capital providers,
              and local service vendors.
            </p>
          </div>
        `;
      } else {
        html = `
          <div class="detail-section">
            <h3>Zone Data</h3>
            <pre>${escapeHtml(JSON.stringify(item, null, 2))}</pre>
          </div>
        `;
      }

      document.getElementById('detail-container').innerHTML = html;
    }

    function generateOutput(briefType) {
      if (!state.selected) {
        alert('Select an item first.');
        return;
      }

      const { item, type } = state.selected;
      const targetId = item.target_id || item.display_name || item.zip_code || item.street || item.address || 'Target';
      const meta = type === 'signal' ? safeJson(item.metadata, {}) : item;
      const date = new Date().toISOString().split('T')[0];
      let text = '';

      if (briefType === 'Contractor Lead Brief') {
        text = `TITLE: Tactical Contractor Pipeline Brief
DATE: ${date}
GENERATED FOR: Local Subs & GCs

TARGET RECORD: ${targetId}
SIGNAL TYPE: ${item.signal_type || 'N/A'}
PERMIT TYPE: ${item.permit_type || meta.permit_type || 'N/A'}
CITY: ${item.city || meta.city || 'N/A'}

WHY THIS MATTERS NOW:
This record suggests active construction movement and probable vendor demand in the near term.

RECOMMENDED OUTREACH:
Lead with speed, availability, and direct relevance to the current project phase.

NOTES:
Address: ${item.address || meta.address || 'N/A'}
Source ID: ${meta.source_id || item.id || 'N/A'}`;
      } else if (briefType === 'Capital Intelligence Brief') {
        text = `TITLE: Capital Movement & Expansion Intelligence
DATE: ${date}

ACTIVE ASSET / ZONE: ${targetId}
VECTOR: ${item.signal_type || 'N/A'}
HORIZON: ${item.temporal_horizon || 'N/A'}

NEXT 30-90 DAYS IMPLICATION:
Permit activity suggests expansion, redevelopment, repositioning, or near-term deployment needs.

NOTES:
Permit Type: ${item.permit_type || meta.permit_type || 'N/A'}
City: ${item.city || meta.city || 'N/A'}`;
      } else if (briefType === 'Distress Opportunity Brief') {
        text = `TITLE: Stalled Asset & Distress Signals
DATE: ${date}

FLAGGED RECORD: ${targetId}
SIGNAL: ${item.signal_type || 'N/A'}
HORIZON: ${item.temporal_horizon || 'N/A'}

ANALYSIS:
This record may indicate trapped capital, delayed execution, redevelopment turnover, or repositioning opportunity.

NOTES:
Address: ${item.address || meta.address || 'N/A'}
Permit Type: ${item.permit_type || meta.permit_type || 'N/A'}`;
      } else if (briefType === 'Outreach Copy') {
        text = `SUBJECT: Quick question regarding ${targetId}

Hi [Name],

I noticed recent permit activity tied to ${targetId}.

Usually when this type of movement shows up, teams are lining up vendors, subs, or capital for the next phase.

Are you currently taking bids or conversations for this phase?

Best,
[Your Name]`;
      }

      document.getElementById('output-area').value = text;
    }

    function copyOutput() {
      const text = document.getElementById('output-area').value;
      if (!text) return;
      navigator.clipboard.writeText(text).then(() => {
        setStatus('Copied to clipboard');
      }).catch(() => {
        alert('Copy failed. Please copy manually.');
      });
    }

    init();
  </script>
</body>
</html>
